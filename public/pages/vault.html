<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Vault — PharmaTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/app.css" rel="stylesheet">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('darkMode')==='true'?'dark':'light');</script>
</head>
<body x-data="layoutData('Document Vault')">
<main class="main-content" :class="{'collapsed': sidebarCollapsed}" x-data="vaultPage()">

  <div class="page-header">
    <div><h1>Document Vault</h1><div class="page-breadcrumb"><a href="dashboard.html">Home</a> / Document Vault</div></div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-folder me-1"></i>New Folder</button>
      <button class="btn btn-primary btn-sm" @click="showUploadModal=true"><i class="bi bi-upload me-1"></i>Upload Document</button>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3"><div class="stat-card stat-primary"><div class="stat-icon"><i class="bi bi-files"></i></div><div><div class="stat-value">4,821</div><div class="stat-label">Total Documents</div></div></div></div>
    <div class="col-6 col-md-3"><div class="stat-card stat-warning"><div class="stat-icon"><i class="bi bi-clock-history"></i></div><div><div class="stat-value">34</div><div class="stat-label">Expiring Soon</div></div></div></div>
    <div class="col-6 col-md-3"><div class="stat-card stat-success"><div class="stat-icon"><i class="bi bi-hdd"></i></div><div><div class="stat-value">12.4 GB</div><div class="stat-label">Storage Used</div></div></div></div>
    <div class="col-6 col-md-3"><div class="stat-card stat-info"><div class="stat-icon"><i class="bi bi-folder2-open"></i></div><div><div class="stat-value">18</div><div class="stat-label">Categories</div></div></div></div>
  </div>

  <div class="row g-3">
    <!-- Category Sidebar -->
    <div class="col-md-3">
      <div class="card">
        <div class="card-body p-0">
          <div class="p-3 border-bottom fw-semibold" style="font-size:13px">Document Categories</div>
          <div class="d-flex flex-column">
            <template x-for="cat in categories" :key="cat.id">
              <button class="nav-item-link" :class="{active: selectedCategory===cat.id}" @click="selectedCategory=cat.id" style="border-radius:0">
                <i :class="cat.icon" class="bi me-2" style="font-size:15px"></i>
                <span style="font-size:13px" x-text="cat.name"></span>
                <span class="ms-auto badge bg-light text-secondary" style="font-size:11px" x-text="cat.count"></span>
              </button>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- Document List -->
    <div class="col-md-9">
      <div class="card mb-3">
        <div class="card-body py-2">
          <div class="row g-2 align-items-center">
            <div class="col-md-5"><div class="search-wrapper"><i class="bi bi-search search-icon"></i><input type="text" class="form-control form-control-sm" placeholder="Search documents..." x-model="search"></div></div>
            <div class="col-6 col-md-3"><select class="form-select form-select-sm" x-model="filterType"><option value="">All Types</option><option>PDF</option><option>Excel</option><option>Word</option><option>Image</option></select></div>
            <div class="col-6 col-md-2"><select class="form-select form-select-sm"><option>Sort: Newest</option><option>Sort: Oldest</option><option>Sort: Name</option></select></div>
            <div class="col-md-2 d-flex gap-1">
              <button class="btn btn-outline-secondary btn-sm" :class="{active:viewMode==='grid'}" @click="viewMode='grid'"><i class="bi bi-grid"></i></button>
              <button class="btn btn-outline-secondary btn-sm" :class="{active:viewMode==='list'}" @click="viewMode='list'"><i class="bi bi-list-ul"></i></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Grid View -->
      <div class="row g-3" x-show="viewMode==='grid'">
        <template x-for="doc in filteredDocs" :key="doc.id">
          <div class="col-md-4 col-6">
            <div class="card cursor-pointer h-100" @click="viewDoc(doc)" style="transition:box-shadow 0.2s" @mouseover="$el.style.boxShadow='0 4px 20px rgba(0,0,0,0.12)'" @mouseleave="$el.style.boxShadow=''">
              <div class="card-body text-center p-3">
                <div class="mb-2" :style="'font-size:40px;color:' + doc.color" x-text="doc.typeIcon"></div>
                <div class="fw-semibold text-truncate" style="font-size:12px" x-text="doc.name"></div>
                <div class="text-muted-sm mt-1" x-text="doc.size + ' · ' + doc.date"></div>
                <div class="mt-2"><span class="badge bg-light text-secondary" style="font-size:11px" x-text="doc.category"></span></div>
                <div x-show="doc.expiring" class="mt-1 text-warning" style="font-size:11px"><i class="bi bi-exclamation-triangle me-1"></i>Expiring soon</div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- List View -->
      <div class="card table-card" x-show="viewMode==='list'">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead><tr><th>Document Name</th><th>Category</th><th>Type</th><th>Size</th><th>Uploaded By</th><th>Date</th><th>Expiry</th><th>Actions</th></tr></thead>
              <tbody>
                <template x-for="doc in filteredDocs" :key="doc.id">
                  <tr class="cursor-pointer" @click="viewDoc(doc)">
                    <td>
                      <div class="d-flex align-items-center gap-2">
                        <span :style="'color:' + doc.color" style="font-size:18px" x-text="doc.typeIcon"></span>
                        <div>
                          <div class="fw-semibold" style="font-size:13px" x-text="doc.name"></div>
                          <div class="text-muted-sm" x-text="doc.ref"></div>
                        </div>
                      </div>
                    </td>
                    <td style="font-size:12px" x-text="doc.category"></td>
                    <td><span class="badge bg-light text-secondary" style="font-size:11px" x-text="doc.type"></span></td>
                    <td style="font-size:12px" x-text="doc.size"></td>
                    <td style="font-size:12px" x-text="doc.uploadedBy"></td>
                    <td style="font-size:12px" x-text="doc.date"></td>
                    <td>
                      <span x-show="doc.expiry" :class="doc.expiring ? 'text-warning fw-semibold' : ''" style="font-size:12px" x-text="doc.expiry"></span>
                      <span x-show="!doc.expiry" class="text-muted-sm">—</span>
                    </td>
                    <td @click.stop>
                      <div class="d-flex gap-1">
                        <button class="btn btn-outline-primary btn-sm btn-icon"><i class="bi bi-download"></i></button>
                        <button class="btn btn-outline-secondary btn-sm btn-icon"><i class="bi bi-share"></i></button>
                        <button class="btn btn-outline-danger btn-sm btn-icon"><i class="bi bi-trash"></i></button>
                      </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal fade" :class="{show:showUploadModal}" :style="showUploadModal?'display:block':''" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title fw-semibold"><i class="bi bi-upload me-2 text-primary"></i>Upload Document</h5><button class="btn-close" @click="showUploadModal=false"></button></div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <div class="border-2 border-dashed rounded-3 p-4 text-center" style="border:2px dashed #dee2e6;cursor:pointer" @click="$refs.fileInput.click()">
                <i class="bi bi-cloud-upload fs-2 text-muted mb-2 d-block"></i>
                <div class="fw-semibold">Click to upload or drag and drop</div>
                <div class="text-muted-sm">PDF, Excel, Word, Images — Max 50MB</div>
                <input type="file" x-ref="fileInput" class="d-none" multiple>
              </div>
            </div>
            <div class="col-12"><label class="form-label">Document Name <span class="text-danger">*</span></label><input type="text" class="form-control" placeholder="e.g. COA-BRN-00142-2601-003"></div>
            <div class="col-md-6"><label class="form-label">Category <span class="text-danger">*</span></label><select class="form-select"><option>Certificate of Analysis (COA)</option><option>MSDS</option><option>GMP Certificate</option><option>Registration Certificate</option><option>Import/Export License</option><option>Other</option></select></div>
            <div class="col-md-6"><label class="form-label">Related Record</label><input type="text" class="form-control" placeholder="BRN, PRN, CI number..."></div>
            <div class="col-md-6"><label class="form-label">Document Date</label><input type="date" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Expiry Date</label><input type="date" class="form-control"></div>
            <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" rows="2" placeholder="Additional information..."></textarea></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" @click="showUploadModal=false">Cancel</button>
          <button class="btn btn-primary"><i class="bi bi-upload me-1"></i>Upload</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade show" x-show="showUploadModal" @click="showUploadModal=false"></div>

</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="../js/layout.js"></script><script src="../js/layout-inject.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => injectLayout('Document Vault', 'vault'));
function vaultPage() {
  return {
    search:'', filterType:'', viewMode:'grid', selectedCategory:0, showUploadModal:false, showViewModal:false, selectedDoc:null,
    categories:[
      {id:0,  name:'All Documents',        icon:'bi-files',                count:4821},
      {id:1,  name:'Certificate of Analysis',icon:'bi-file-earmark-check', count:1842},
      {id:2,  name:'MSDS',                  icon:'bi-file-earmark-text',   count:248},
      {id:3,  name:'GMP Certificates',      icon:'bi-award',               count:94},
      {id:4,  name:'Registration Certs.',   icon:'bi-patch-check',         count:1107},
      {id:5,  name:'Import/Export License', icon:'bi-globe2',              count:312},
      {id:6,  name:'Proforma Invoices',     icon:'bi-receipt',             count:189},
      {id:7,  name:'Commercial Invoices',   icon:'bi-file-earmark-check',  count:156},
      {id:8,  name:'Shipping Documents',    icon:'bi-truck',               count:873},
    ],
    docs:[
      {id:1, name:'COA-BRN-00142-2601-003.pdf',  ref:'BRN-00142-2601-003', category:'COA',          type:'PDF',   typeIcon:'📄', color:'#dc3545', size:'1.2 MB',  date:'Jan 20, 2026', expiry:'Jul 10, 2026', expiring:true,  uploadedBy:'Dr. Lee QC'},
      {id:2, name:'MSDS-ANT-042.pdf',            ref:'PRN-US-ANT-00142',   category:'MSDS',         type:'PDF',   typeIcon:'📄', color:'#dc3545', size:'0.8 MB',  date:'Jan 15, 2026', expiry:'',             expiring:false, uploadedBy:'Dr. Lee QC'},
      {id:3, name:'GMP-US-2024-001.pdf',         ref:'Mfg Site US-01',     category:'GMP Cert',     type:'PDF',   typeIcon:'📄', color:'#dc3545', size:'2.1 MB',  date:'Mar 1, 2024',  expiry:'Mar 1, 2027',  expiring:false, uploadedBy:'Regulatory'},
      {id:4, name:'REG-PH-2024-00142.pdf',       ref:'PRN-US-ANT-00142',   category:'Registration', type:'PDF',   typeIcon:'📄', color:'#dc3545', size:'0.5 MB',  date:'Jan 10, 2024', expiry:'Jan 9, 2027',  expiring:false, uploadedBy:'Regulatory'},
      {id:5, name:'COA-BRN-00089-2603-001.pdf',  ref:'BRN-00089-2603-001', category:'COA',          type:'PDF',   typeIcon:'📄', color:'#dc3545', size:'1.0 MB',  date:'Mar 10, 2026', expiry:'Jun 28, 2026', expiring:true,  uploadedBy:'Dr. Ahmed QC'},
      {id:6, name:'SHP-2026-0498-PackingList.pdf',ref:'SHP-2026-0498',     category:'Shipping',     type:'PDF',   typeIcon:'📄', color:'#dc3545', size:'0.3 MB',  date:'Jun 6, 2026',  expiry:'',             expiring:false, uploadedBy:'Logistics'},
      {id:7, name:'CI-2026-0072.pdf',            ref:'CI-2026-0072',       category:'Commercial Invoice',type:'PDF',typeIcon:'📄',color:'#dc3545',size:'0.4 MB',  date:'Jun 5, 2026',  expiry:'',             expiring:false, uploadedBy:'Finance'},
      {id:8, name:'DGDA-Approval-BD.xlsx',       ref:'PRN-BD-INJ-00089',   category:'Registration', type:'Excel', typeIcon:'📊', color:'#198754', size:'0.2 MB',  date:'Feb 15, 2025', expiry:'Feb 14, 2028', expiring:false, uploadedBy:'Regulatory'},
    ],
    viewDoc(doc){ this.selectedDoc=doc; },
    get filteredDocs(){
      return this.docs.filter(d=>{
        const q=this.search.toLowerCase();
        return (!q||d.name.toLowerCase().includes(q)||d.ref.toLowerCase().includes(q))
          &&(!this.filterType||d.type===this.filterType);
      });
    }
  };
}
</script>
</body>
</html>

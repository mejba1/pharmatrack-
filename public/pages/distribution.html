<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distribution Hierarchy — PharmaTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/app.css" rel="stylesheet">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('darkMode')==='true'?'dark':'light');</script>
</head>
<body x-data="layoutData('Distribution Hierarchy')">
<main class="main-content" :class="{'collapsed': sidebarCollapsed}" x-data="distPage()">

  <div class="page-header">
    <div><h1>Distribution Hierarchy</h1><div class="page-breadcrumb"><a href="dashboard.html">Home</a> / Distribution Hierarchy</div></div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-download me-1"></i>Export</button>
      <button class="btn btn-primary btn-sm" @click="showAddModal=true"><i class="bi bi-plus-lg me-1"></i>Add Entity</button>
    </div>
  </div>

  <!-- Hierarchy Info -->
  <div class="card mb-4">
    <div class="card-body py-3">
      <div class="row g-0 align-items-center justify-content-center">
        <template x-for="(level, i) in levels" :key="level.num">
          <div class="d-flex align-items-center">
            <div class="text-center px-3">
              <div class="mx-auto mb-2 d-flex align-items-center justify-content-center rounded-circle" :style="'width:52px;height:52px;background:' + level.color + '22;border:2px solid ' + level.color">
                <i :class="level.icon" :style="'color:' + level.color" style="font-size:20px"></i>
              </div>
              <div class="fw-semibold" style="font-size:12px" x-text="'Level ' + level.num"></div>
              <div class="text-muted-sm" x-text="level.label"></div>
              <div class="fw-bold mt-1" :style="'color:' + level.color" x-text="level.count"></div>
            </div>
            <div x-show="i < levels.length - 1" class="text-muted px-1" style="font-size:20px">→</div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Tab: Level view -->
  <div class="pills-nav mb-3">
    <button class="pill-btn" :class="{active:levelFilter===0}" @click="levelFilter=0">All Levels</button>
    <button class="pill-btn" :class="{active:levelFilter===2}" @click="levelFilter=2">Distributors</button>
    <button class="pill-btn" :class="{active:levelFilter===3}" @click="levelFilter=3">Sub-Distributors</button>
    <button class="pill-btn" :class="{active:levelFilter===4}" @click="levelFilter=4">Agents</button>
  </div>

  <div class="card mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-center">
        <div class="col-md-4"><div class="search-wrapper"><i class="bi bi-search search-icon"></i><input type="text" class="form-control form-control-sm" placeholder="Search entity name, country..." x-model="search"></div></div>
        <div class="col-6 col-md-2"><select class="form-select form-select-sm"><option value="">All Countries</option><option>Philippines</option><option>Nigeria</option><option>Bangladesh</option><option>Egypt</option></select></div>
        <div class="col-6 col-md-2"><select class="form-select form-select-sm"><option value="">All Status</option><option>Active</option><option>Suspended</option><option>Pending</option></select></div>
        <div class="col-md-2 d-flex gap-1"><button class="btn btn-primary btn-sm flex-fill">Filter</button><button class="btn btn-outline-secondary btn-sm"><i class="bi bi-x-lg"></i></button></div>
      </div>
    </div>
  </div>

  <div class="card table-card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr>
            <th>Level</th><th>Entity Name</th><th>Country / Territory</th><th>Parent</th>
            <th>License No.</th><th>Annual Quota</th><th>Sub-entities</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody>
            <template x-for="e in filtered" :key="e.id">
              <tr>
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" :style="'width:28px;height:28px;background:'+e.levelColor+'22;font-size:11px;font-weight:700;color:'+e.levelColor" x-text="'L' + e.level"></div>
                    <span style="font-size:12px" x-text="e.levelLabel"></span>
                  </div>
                </td>
                <td>
                  <div class="fw-semibold" style="font-size:13px" x-text="e.name"></div>
                  <div class="text-muted-sm" x-text="e.contactPerson"></div>
                </td>
                <td>
                  <div style="font-size:13px" x-text="e.flag + ' ' + e.country"></div>
                  <div class="text-muted-sm" x-text="e.territory"></div>
                </td>
                <td style="font-size:13px" x-text="e.parent || '—'"></td>
                <td><code style="font-size:12px" x-text="e.license"></code></td>
                <td style="font-size:13px" x-text="e.quota"></td>
                <td>
                  <span class="badge bg-light text-secondary" style="font-size:12px" x-text="e.children + ' entities'"></span>
                </td>
                <td><span class="badge-status" :class="'badge-' + e.statusClass" x-text="e.status"></span></td>
                <td>
                  <div class="d-flex gap-1">
                    <button class="btn btn-outline-primary btn-sm btn-icon" @click="viewEntity(e)"><i class="bi bi-eye"></i></button>
                    <button class="btn btn-outline-secondary btn-sm btn-icon"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-outline-info btn-sm btn-icon" title="View sub-entities"><i class="bi bi-diagram-3"></i></button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div class="d-flex align-items-center justify-content-between px-3 py-2 border-top">
        <div class="text-muted-sm">Showing <strong x-text="filtered.length"></strong> entities</div>
        <nav><ul class="pagination pagination-sm mb-0"><li class="page-item disabled"><a class="page-link">Prev</a></li><li class="page-item active"><a class="page-link">1</a></li><li class="page-item"><a class="page-link">2</a></li><li class="page-item"><a class="page-link">Next</a></li></ul></nav>
      </div>
    </div>
  </div>

  <!-- Entity Detail Modal -->
  <div class="modal fade" :class="{show:showViewModal}" :style="showViewModal?'display:block':''" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content" x-show="selectedEntity">
        <div class="modal-header">
          <div><h5 class="modal-title fw-semibold" x-text="selectedEntity?.name"></h5><div class="text-muted-sm" x-text="'Level ' + selectedEntity?.level + ' — ' + selectedEntity?.levelLabel"></div></div>
          <div class="ms-auto d-flex gap-2 align-items-center">
            <span class="badge-status" :class="'badge-' + selectedEntity?.statusClass" x-text="selectedEntity?.status"></span>
            <button class="btn-close ms-2" @click="showViewModal=false"></button>
          </div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Country</label><div x-text="selectedEntity?.flag + ' ' + selectedEntity?.country"></div></div>
            <div class="col-md-6"><label class="form-label">Territory</label><div x-text="selectedEntity?.territory"></div></div>
            <div class="col-md-6"><label class="form-label">Contact Person</label><div x-text="selectedEntity?.contactPerson"></div></div>
            <div class="col-md-6"><label class="form-label">License No.</label><code x-text="selectedEntity?.license"></code></div>
            <div class="col-md-6"><label class="form-label">Annual Quota</label><div x-text="selectedEntity?.quota"></div></div>
            <div class="col-md-6"><label class="form-label">Parent Entity</label><div x-text="selectedEntity?.parent || 'Manufacturer (Top Level)'"></div></div>
            <div class="col-12">
              <div class="info-box info">
                <i class="bi bi-diagram-3 text-primary mt-1"></i>
                <div style="font-size:13px">This entity has <strong x-text="selectedEntity?.children"></strong> sub-entities and manages orders within its assigned territory.</div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-sm" @click="showViewModal=false">Close</button>
          <button class="btn btn-outline-primary btn-sm"><i class="bi bi-diagram-3 me-1"></i>View Sub-Entities</button>
          <button class="btn btn-primary btn-sm"><i class="bi bi-pencil me-1"></i>Edit</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade show" x-show="showViewModal" @click="showViewModal=false"></div>

  <!-- Add Entity Modal -->
  <div class="modal fade" :class="{show:showAddModal}" :style="showAddModal?'display:block':''" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title fw-semibold"><i class="bi bi-diagram-3 me-2 text-primary"></i>Add Distribution Entity</h5><button class="btn-close" @click="showAddModal=false"></button></div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Entity Level <span class="text-danger">*</span></label><select class="form-select"><option>Level 2 — Distributor</option><option>Level 3 — Sub-Distributor</option><option>Level 4 — Agent</option></select></div>
            <div class="col-md-6"><label class="form-label">Parent Entity</label><select class="form-select"><option>Manufacturer (Top Level)</option><option>PharmaDist PH Ltd. (L2)</option><option>West Africa Pharma (L2)</option></select></div>
            <div class="col-md-6"><label class="form-label">Entity / Company Name <span class="text-danger">*</span></label><input type="text" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Contact Person <span class="text-danger">*</span></label><input type="text" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Country <span class="text-danger">*</span></label><select class="form-select"><option>Select...</option><option>Philippines</option><option>Nigeria</option><option>Bangladesh</option></select></div>
            <div class="col-md-6"><label class="form-label">Territory / Zone</label><input type="text" class="form-control" placeholder="e.g. Luzon Region, Metro Manila"></div>
            <div class="col-md-6"><label class="form-label">Distribution License No. <span class="text-danger">*</span></label><input type="text" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">License Expiry</label><input type="date" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Annual Quota (Units)</label><input type="number" class="form-control" placeholder="0"></div>
            <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" @click="showAddModal=false">Cancel</button>
          <button class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Add Entity</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade show" x-show="showAddModal" @click="showAddModal=false"></div>

</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="../js/layout.js"></script><script src="../js/layout-inject.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => injectLayout('Distribution Hierarchy', 'distribution'));
function distPage() {
  return {
    search:'', levelFilter:0, showAddModal:false, showViewModal:false, selectedEntity:null,
    levels:[
      {num:1,label:'Manufacturer',icon:'bi-building',color:'#0d6efd',count:'1'},
      {num:2,label:'Distributor',icon:'bi-diagram-3',color:'#198754',count:'24'},
      {num:3,label:'Sub-Distributor',icon:'bi-diagram-2',color:'#fd7e14',count:'112'},
      {num:4,label:'Agent',icon:'bi-person-badge',color:'#6f42c1',count:'486'},
      {num:5,label:'Patient',icon:'bi-person-heart',color:'#dc3545',count:'∞'},
    ],
    entities:[
      { id:1, level:2, levelLabel:'Distributor',    levelColor:'#198754', name:'PharmaDist PH Ltd.',    contactPerson:'Maria Santos',   flag:'🇵🇭', country:'Philippines', territory:'National',         parent:'',               license:'DIST-PH-2024-001', quota:'500,000 units/yr',  children:8, status:'Active',    statusClass:'active'    },
      { id:2, level:2, levelLabel:'Distributor',    levelColor:'#198754', name:'West Africa Pharma',    contactPerson:'Emeka Okonkwo',  flag:'🇳🇬', country:'Nigeria',     territory:'National',         parent:'',               license:'DIST-NG-2024-008', quota:'350,000 units/yr',  children:14,status:'Active',    statusClass:'active'    },
      { id:3, level:2, levelLabel:'Distributor',    levelColor:'#198754', name:'BD MedCo Ltd.',         contactPerson:'Rahim Chowdhury',flag:'🇧🇩', country:'Bangladesh',  territory:'National',         parent:'',               license:'DIST-BD-2023-015', quota:'280,000 units/yr',  children:6, status:'Active',    statusClass:'active'    },
      { id:4, level:3, levelLabel:'Sub-Distributor',levelColor:'#fd7e14', name:'Luzon MedSupply',       contactPerson:'Jose Dela Cruz', flag:'🇵🇭', country:'Philippines', territory:'Luzon Region',     parent:'PharmaDist PH',  license:'SDST-PH-2025-003',quota:'80,000 units/yr',   children:12,status:'Active',    statusClass:'active'    },
      { id:5, level:3, levelLabel:'Sub-Distributor',levelColor:'#fd7e14', name:'Lagos Pharma Hub',      contactPerson:'Chidi Eze',      flag:'🇳🇬', country:'Nigeria',     territory:'Lagos & Ogun',     parent:'West Africa Pharma',license:'SDST-NG-2025-011',quota:'60,000 units/yr',   children:9, status:'Active',    statusClass:'active'    },
      { id:6, level:4, levelLabel:'Agent',          levelColor:'#6f42c1', name:'Metro Manila Clinic',   contactPerson:'Dr. Ana Reyes',  flag:'🇵🇭', country:'Philippines', territory:'Metro Manila',     parent:'Luzon MedSupply', license:'AGT-PH-2026-021', quota:'15,000 units/yr',   children:0, status:'Active',    statusClass:'active'    },
      { id:7, level:3, levelLabel:'Sub-Distributor',levelColor:'#fd7e14', name:'Dhaka Central Dist.',   contactPerson:'Fatema Begum',   flag:'🇧🇩', country:'Bangladesh',  territory:'Dhaka Division',  parent:'BD MedCo Ltd.',  license:'SDST-BD-2025-007',quota:'50,000 units/yr',   children:7, status:'Pending',   statusClass:'pending'   },
    ],
    viewEntity(e){ this.selectedEntity=e; this.showViewModal=true; },
    get filtered(){
      return this.entities.filter(e=>{
        const q=this.search.toLowerCase();
        return (!q||e.name.toLowerCase().includes(q)||e.country.toLowerCase().includes(q))
          &&(this.levelFilter===0||e.level===this.levelFilter);
      });
    }
  };
}
</script>
</body>
</html>
